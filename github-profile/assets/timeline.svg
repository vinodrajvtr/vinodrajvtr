<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="tlBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tlLineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#38BDF8;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="tlDotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#tlBgGrad)" rx="16"/>
  <rect x="20" y="20" width="560" height="460" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="80" y1="60" x2="80" y2="460" stroke="url(#tlLineGrad)" stroke-width="2"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-5,0;0,0" dur="4s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="80" cy="90" r="10" fill="url(#tlDotGrad)" opacity="0.15">
      <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="90" r="5" fill="url(#tlDotGrad)"/>
    <text x="110" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00E5FF">2022</text>
    <text x="110" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">Started Full Stack Development</text>
  </g>
  <g>
    <circle cx="80" cy="180" r="10" fill="#00E5FF" opacity="0.15">
      <animate attributeName="r" values="10;14;10" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="180" r="5" fill="#38BDF8"/>
    <text x="110" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#38BDF8">2023</text>
    <text x="110" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">React + .NET</text>
  </g>
  <g>
    <circle cx="80" cy="270" r="10" fill="#38BDF8" opacity="0.15">
      <animate attributeName="r" values="10;14;10" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="270" r="5" fill="#00E5FF"/>
    <text x="110" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00E5FF">2024</text>
    <text x="110" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">Next.js + TypeScript</text>
  </g>
  <g>
    <circle cx="80" cy="360" r="10" fill="#7C3AED" opacity="0.15">
      <animate attributeName="r" values="10;14;10" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="360" r="5" fill="#7C3AED"/>
    <text x="110" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#7C3AED">2025</text>
    <text x="110" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">AI Products</text>
  </g>
  <g>
    <circle cx="80" cy="430" r="10" fill="url(#tlDotGrad)" opacity="0.2">
      <animate attributeName="r" values="10;14;10" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="430" r="5" fill="url(#tlDotGrad)"/>
    <text x="110" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00E5FF">2026</text>
    <text x="110" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">LLMs &bull; RAG &bull; Agentic AI</text>
  </g>
</svg>