<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="avBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="avBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <clipPath id="avClip">
      <circle cx="100" cy="100" r="85"/>
    </clipPath>
  </defs>
  <rect x="-10" y="-10" width="220" height="220" fill="url(#avBgGrad)"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#avBorderGrad)" stroke-width="3">
    <animate attributeName="stroke-dashoffset" values="0;565" dur="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="88" fill="rgba(255,255,255,0.03)" stroke="none"/>
  <circle cx="100" cy="100" r="85" fill="rgba(0,229,255,0.05)"/>
  <g clip-path="url(#avClip)">
    <circle cx="100" cy="100" r="85" fill="#0D1117"/>
    <circle cx="100" cy="85" r="35" fill="rgba(0,229,255,0.15)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>
    <path d="M 55 180 Q 100 130 145 180" fill="rgba(0,229,255,0.08)" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
    <g opacity="0.08">
      <text x="100" y="110" font-family="monospace" font-size="40" fill="#00E5FF" text-anchor="middle"></></text>
    </g>
  </g>
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(0,229,255,0.2)" stroke-width="1" stroke-dasharray="8 6">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(124,58,237,0.15)" stroke-width="0.5" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate" values="360 100 100;0 100 100" dur="25s" repeatCount="indefinite"/>
  </circle>
</svg>