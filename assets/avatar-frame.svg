<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="avBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.7" />
    </linearGradient>
    <clipPath id="avClip">
      <circle cx="100" cy="100" r="82"/>
    </clipPath>
  </defs>
  <rect x="-10" y="-10" width="220" height="220" fill="#0D1117"/>
  <circle cx="100" cy="100" r="85" fill="rgba(255,255,255,0.02)" stroke="url(#avBorder)" stroke-width="2.5"/>
  <g clip-path="url(#avClip)">
    <circle cx="100" cy="100" r="82" fill="#0D1117"/>
    <circle cx="100" cy="80" r="30" fill="rgba(0,229,255,0.12)" stroke="rgba(0,229,255,0.25)" stroke-width="0.8"/>
    <path d="M 55 175 Q 100 125 145 175" fill="rgba(0,229,255,0.06)" stroke="rgba(0,229,255,0.15)" stroke-width="0.8"/>
    <g opacity="0.06">
      <text x="100" y="110" font-family="monospace" font-size="35" fill="#00E5FF" text-anchor="middle"></></text>
    </g>
  </g>
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="0.8" stroke-dasharray="6 5">
    <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(124,58,237,0.1)" stroke-width="0.5" stroke-dasharray="3 6">
    <animateTransform attributeName="transform" type="rotate" values="360 100 100;0 100 100" dur="25s" repeatCount="indefinite"/>
  </circle>
</svg>