<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0" />
      <stop offset="25%" style="stop-color:#00E5FF;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#38BDF8;stop-opacity:0.7" />
      <stop offset="75%" style="stop-color:#00E5FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="800" height="40" fill="transparent"/>
  <line x1="50" y1="20" x2="750" y2="20" stroke="url(#dividerGrad)" stroke-width="1"/>
  <circle cx="400" cy="20" r="3" fill="#00E5FF" opacity="0.8">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>