<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="tlBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tlLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#38BDF8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="tlDot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#tlBg)" rx="16"/>
  <rect x="20" y="20" width="560" height="440" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <line x1="80" y1="50" x2="80" y2="440" stroke="url(#tlLine)" stroke-width="2"/>
  <g>
    <circle cx="80" cy="85" r="8" fill="#00E5FF" opacity="0.15">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="85" r="4" fill="url(#tlDot)"/>
    <text x="105" y="90" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#00E5FF">2022</text>
    <text x="105" y="105" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Started Full Stack Development</text>
  </g>
  <g>
    <circle cx="80" cy="170" r="8" fill="#00E5FF" opacity="0.15">
      <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="170" r="4" fill="#38BDF8"/>
    <text x="105" y="175" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#38BDF8">2023</text>
    <text x="105" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">React + .NET Core</text>
  </g>
  <g>
    <circle cx="80" cy="255" r="8" fill="#38BDF8" opacity="0.15">
      <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="255" r="4" fill="#00E5FF"/>
    <text x="105" y="260" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#00E5FF">2024</text>
    <text x="105" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Next.js + TypeScript</text>
  </g>
  <g>
    <circle cx="80" cy="340" r="8" fill="#7C3AED" opacity="0.15">
      <animate attributeName="r" values="8;12;8" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="340" r="4" fill="#7C3AED"/>
    <text x="105" y="345" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#7C3AED">2025</text>
    <text x="105" y="360" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">AI Products</text>
  </g>
  <g>
    <circle cx="80" cy="415" r="8" fill="url(#tlDot)" opacity="0.2">
      <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="415" r="4" fill="url(#tlDot)"/>
    <text x="105" y="420" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#00E5FF">2026</text>
    <text x="105" y="435" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">LLMs &bull; RAG &bull; Agentic AI</text>
  </g>
</svg>