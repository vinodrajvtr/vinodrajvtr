<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="aiBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0.02" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#aiBg)" rx="16"/>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="url(#aiAccent)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <g opacity="0.12">
    <circle cx="100" cy="80" r="60" fill="none" stroke="#00E5FF" stroke-width="0.5">
      <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="40" fill="none" stroke="#38BDF8" stroke-width="0.3">
      <animate attributeName="r" values="40;44;40" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity="0.08">
    <rect x="450" y="250" width="70" height="70" rx="6" fill="none" stroke="#7C3AED" stroke-width="0.6">
      <animateTransform attributeName="transform" type="rotate" values="0 485 285;25 485 285;0 485 285" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0.05">
    <text x="300" y="240" font-family="monospace" font-size="100" font-weight="300" fill="#00E5FF" text-anchor="middle">AI</text>
  </g>
</svg>