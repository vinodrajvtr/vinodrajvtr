<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="aiBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiPrimaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="aiSecondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#aiBgGrad)" rx="16"/>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="url(#aiSecondaryGrad)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <g opacity="0.15">
    <circle cx="100" cy="80" r="60" fill="none" stroke="#00E5FF" stroke-width="0.5">
      <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="40" fill="none" stroke="#38BDF8" stroke-width="0.3">
      <animate attributeName="r" values="40;45;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="20" fill="#00E5FF" opacity="0.1"/>
  </g>
  <g opacity="0.1">
    <rect x="450" y="250" width="80" height="80" rx="8" fill="none" stroke="#7C3AED" stroke-width="0.8">
      <animate attributeName="transform" type="rotate" values="0 490 290;30 490 290;0 490 290" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0.08">
    <circle cx="500" cy="80" r="4" fill="#00E5FF">
      <animate attributeName="cx" values="500;520;500" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="100" r="3" fill="#38BDF8">
      <animate attributeName="cx" values="500;515;500" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="120" r="2" fill="#7C3AED">
      <animate attributeName="cx" values="500;510;500" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity="0.06">
    <path d="M 50 300 Q 150 260 250 290 Q 350 320 450 280 Q 550 240 600 260" fill="none" stroke="#00E5FF" stroke-width="0.5">
      <animate attributeName="d" values="
        M 50 300 Q 150 260 250 290 Q 350 320 450 280 Q 550 240 600 260;
        M 50 290 Q 150 270 250 280 Q 350 300 450 270 Q 550 250 600 270;
        M 50 300 Q 150 260 250 290 Q 350 320 450 280 Q 550 240 600 260"
        dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
  <g opacity="0.05">
    <text x="300" y="230" font-family="monospace" font-size="120" font-weight="300" fill="#00E5FF" text-anchor="middle">AI</text>
  </g>
</svg>